<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arca봉사자노트</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%233d5a3e'/%3E%3Crect x='31' y='10' width='2.5' height='26' fill='%23fff' rx='1'/%3E%3Cpolygon points='33.5,12 33.5,30 18,24' fill='%23ffffff'/%3E%3Cpath d='M10 38 Q32 52 54 38 L50 46 Q32 56 14 46 Z' fill='%23fff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ee;
  --surface:#fff;
  --surface2:#f0ede6;
  --border:#ddd8ce;
  --text:#1a1814;
  --text2:#5a5650;
  --text3:#9a9490;
  --accent:#3d5a3e;
  --accent2:#5a7d5c;
  --accent-light:#e8f0e8;
  --red:#7a2020;
  --red-light:#fdf0f0;
  --r:10px;
  --sh:0 2px 10px rgba(0,0,0,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* ── 화면 전환 ── */
.screen{display:none}
.screen.active{display:block}

/* ── 헤더 ── */
.hdr{background:var(--accent);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.hdr h1{font-family:'Nanum Myeongjo',serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:.03em}
.hdr .sub{font-size:11px;opacity:.65;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:8px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.hdr-btn:active{background:rgba(255,255,255,.28)}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;opacity:.9;flex-shrink:0}

/* ── 탭 ── */
.tab-nav{display:flex;background:var(--surface);border-bottom:1.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:53px;z-index:99}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:13px 18px 12px;font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;color:var(--text3);background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;cursor:pointer;white-space:nowrap}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── 콘텐츠 래퍼 ── */
.content{max-width:680px;margin:0 auto;padding:16px 14px}
.section{display:none}
.section.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── 카드 ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;box-shadow:var(--sh);overflow:hidden}
.card-hdr{background:var(--surface2);padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:'Nanum Myeongjo',serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.04em}
.card-body{padding:16px}

/* ── 폼 필드 (세로 스택) ── */
.field{margin-bottom:14px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.02em}
.field input,.field select,.field textarea{width:100%;font-family:'Nanum Gothic',sans-serif;font-size:16px;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px var(--accent-light)}
.field textarea{resize:vertical;line-height:1.6;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field-row .field{margin-bottom:0}
.field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.field-row-3 .field{margin-bottom:0}

/* ── 버튼 ── */
.btn{font-family:'Nanum Gothic',sans-serif;font-size:13px;font-weight:700;padding:9px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:active{opacity:.75}
.btn-green{background:var(--accent-light);border-color:var(--accent2);color:var(--accent)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-red{color:var(--red);border-color:#e8bbbb;background:var(--red-light)}

/* ── 그룹원 카드 목록 ── */
.member-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.member-card-hdr{background:var(--surface2);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.member-num{font-size:12px;font-weight:700;color:var(--accent)}
.member-card-body{padding:12px 14px}
.member-field{margin-bottom:10px}
.member-field:last-child{margin-bottom:0}
.member-field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
.member-field input{width:100%;font-family:'Nanum Gothic',sans-serif;font-size:15px;padding:10px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text)}
.member-field input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px var(--accent-light)}
.member-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.member-field-row .member-field{margin-bottom:0}
.empty-hint{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px;line-height:1.8}

/* ── 출석부 ── */
.att-date-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.att-date-row input{flex:1;min-width:100px;font-family:'Nanum Gothic',sans-serif;font-size:15px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text)}
.att-date-row input:focus{outline:none;border-color:var(--accent2)}

.att-member-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.att-member-name{background:var(--surface2);padding:9px 14px;font-size:13px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border)}
.att-dates-grid{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.att-date-item{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:52px}
.att-date-label{font-size:11px;color:var(--text3);font-weight:700}
.att-sel{font-family:'Nanum Gothic',sans-serif;font-size:16px;font-weight:700;width:52px;height:42px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text);text-align:center;cursor:pointer;-webkit-appearance:none;appearance:none}
.att-sel:focus{outline:none;border-color:var(--accent2)}
.att-o{background:#eaf5ec;border-color:#7dba8a;color:#1a6e2e}
.att-x{background:#fdf0f0;border-color:#e8aaaa;color:#7a2020}
.att-tri{background:#fdf8e8;border-color:#d4b860;color:#7a5800}

/* ── 인원수 ── */
.count-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.count-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.count-box label{font-size:12px;font-weight:700;color:var(--text2)}
.count-box input{font-family:'Nanum Gothic',sans-serif;font-size:20px;font-weight:700;width:100%;padding:6px 4px;border:none;border-bottom:2px solid var(--border);background:transparent;color:var(--accent);text-align:center}
.count-box input:focus{outline:none;border-bottom-color:var(--accent)}

/* ── 마침 그룹원 ── */
.report-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.report-card-hdr{background:var(--surface2);padding:9px 14px;font-size:13px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border)}
.report-card-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.report-field label{display:block;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:4px}
.report-field input{width:100%;font-family:'Nanum Gothic',sans-serif;font-size:15px;padding:10px 12px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text)}
.report-field input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 3px var(--accent-light)}

/* ── 목록 화면 ── */
.list-content{max-width:680px;margin:0 auto;padding:16px 14px}
.list-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.list-toolbar h2{font-family:'Nanum Myeongjo',serif;font-size:15px;font-weight:700}
.list-empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:48px 20px;text-align:center;color:var(--text3);font-size:13px;line-height:2.2}
.list-empty strong{display:block;font-size:15px;color:var(--text2);margin-bottom:4px}
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--sh);display:flex;align-items:stretch;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent}
.record-card:active{opacity:.8}
.card-accent-bar{width:5px;background:var(--accent);flex-shrink:0}
.card-info{padding:14px 16px;flex:1;min-width:0}
.card-topic{font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.card-meta span{font-size:12px;color:var(--text2)}
.card-badge{background:var(--accent-light);color:var(--accent2);padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.card-btns{display:flex;flex-direction:column;justify-content:center;padding:10px 10px 10px 0;gap:6px}
.icon-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Nanum Gothic',sans-serif;color:var(--text2)}
.icon-btn:active{background:var(--surface2)}
.icon-btn.del{color:var(--red);border-color:#e8bbbb}

/* ── PDF 버튼 영역 ── */
.pdf-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.pdf-bar .btn{flex:1;min-width:0;justify-content:center;font-size:12px;padding:10px 8px}

/* ── info 요약 (마침보고서 상단) ── */
.info-summary{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.8;color:var(--text2)}
.info-summary strong{color:var(--text);font-weight:700}
</style>
</head>
<body>

<!-- ═══════════ 목록 화면 ═══════════ -->
<div id="screen-list" class="screen active">
  <header class="hdr">
    <div>
      <h1>Arca봉사자노트</h1>
      <div class="sub">가톨릭 그룹공부 봉사자 기록</div>
    </div>
    <div class="hdr-right">
      <button class="hdr-btn" onclick="newRecord()">＋ 새 기록</button>
    </div>
  </header>
  <div class="list-content">
    <div class="list-toolbar">
      <h2 id="list-count">기록 목록</h2>
    </div>
    <div id="list-area"></div>
  </div>
</div>

<!-- ═══════════ 편집 화면 ═══════════ -->
<div id="screen-edit" class="screen">
  <header class="hdr">
    <button class="back-btn" onclick="goList()">&#8592;</button>
    <div style="min-width:0">
      <h1 id="edit-title" style="font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">새 기록</h1>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showTab(0)">① 시작 보고서</button>
    <button class="tab-btn" onclick="showTab(1)">② 출석부</button>
    <button class="tab-btn" onclick="showTab(2)">③ 마침 보고서</button>
  </nav>

  <div class="content">

    <!-- ───── ① 시작 보고서 ───── -->
    <div class="section active" id="sec0">

      <!-- PDF 버튼 -->
      <div class="pdf-bar">
        <button class="btn btn-accent" onclick="printPDF(0)">🖨️ 시작 보고서 PDF</button>
      </div>

      <div class="card">
        <div class="card-hdr"><span class="card-title">봉사자 기본정보</span></div>
        <div class="card-body">
          <div class="field-row">
            <div class="field"><label>공부하는 곳</label><input type="text" id="parish" placeholder="예) 구포성당" oninput="autoSave()"></div>
            <div class="field"><label>요일 · 시간</label><input type="text" id="schedule" placeholder="예) 월 18:30" oninput="autoSave()"></div>
          </div>
          <div class="field"><label>그룹 공부 주제</label><input type="text" id="topic" placeholder="예) 요한" oninput="autoSave();updateEditTitle()"></div>
          <div class="field-row">
            <div class="field"><label>이름</label><input type="text" id="vol_name" placeholder="봉사자 이름" oninput="autoSave()"></div>
            <div class="field"><label>세례명</label><input type="text" id="vol_bap" placeholder="세례명" oninput="autoSave()"></div>
          </div>
          <div class="field"><label>생년월일</label><input type="text" id="vol_birth" placeholder="예) 1980.01.01" oninput="autoSave()"></div>
          <div class="field"><label>주소 (자택)</label><input type="text" id="addr_home" placeholder="자택 주소" oninput="autoSave()"></div>
          <div class="field"><label>대학 / 직장</label><input type="text" id="addr_work" placeholder="대학 또는 직장" oninput="autoSave()"></div>
          <div class="field-row">
            <div class="field"><label>연락처</label><input type="tel" id="phone" placeholder="010-0000-0000" oninput="autoSave()"></div>
            <div class="field"><label>이메일</label><input type="email" id="email" placeholder="이메일" oninput="autoSave()"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>본당</label><input type="text" id="vol_parish" placeholder="소속 본당" oninput="autoSave()"></div>
            <div class="field"><label>고유번호</label><input type="text" id="vol_id" placeholder="고유번호" oninput="autoSave()"></div>
          </div>
          <div class="field"><label>시작일</label><input type="date" id="date_start" onchange="autoSave();updateEditTitle()"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr">
          <span class="card-title">그룹원 명단</span>
          <button class="btn btn-green" onclick="addMember()">＋ 추가</button>
        </div>
        <div class="card-body" id="member-list">
          <div class="empty-hint">「추가」 버튼을 눌러<br>그룹원을 입력하세요.</div>
        </div>
      </div>
    </div>

    <!-- ───── ② 출석부 ───── -->
    <div class="section" id="sec1">

      <div class="pdf-bar">
        <button class="btn btn-accent" onclick="printPDF(1)">🖨️ 출석부 PDF</button>
      </div>

      <div class="card">
        <div class="card-hdr"><span class="card-title">날짜 관리</span></div>
        <div class="card-body">
          <div class="att-date-row">
            <input type="text" id="new-date" placeholder="날짜 입력 (예: 1/26)" onkeydown="if(event.key==='Enter')addDateCol()">
            <button class="btn btn-green" onclick="addDateCol()">＋ 추가</button>
            <button class="btn btn-red" onclick="removeLastDate()">삭제</button>
          </div>
          <div id="date-chips" style="display:flex;flex-wrap:wrap;gap:6px"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span class="card-title">출결 입력</span></div>
        <div class="card-body" id="att-list">
          <div class="empty-hint">① 시작 보고서에서 그룹원을 추가하고<br>날짜를 먼저 입력하세요.</div>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:-6px">
        <strong style="color:#1a6e2e">○ 출석</strong> &nbsp;·&nbsp; <strong style="color:#7a2020">× 결석</strong> &nbsp;·&nbsp; <strong style="color:#7a5800">△ 지각/조퇴</strong>
      </p>
    </div>

    <!-- ───── ③ 마침 보고서 ───── -->
    <div class="section" id="sec2">

      <div class="pdf-bar">
        <button class="btn btn-accent" onclick="printPDF(2)">🖨️ 마침 보고서 PDF</button>
      </div>

      <div class="card">
        <div class="card-hdr"><span class="card-title">기본정보 요약</span></div>
        <div class="card-body" style="padding:12px 16px">
          <div id="r3-summary" class="info-summary"></div>
          <div class="field"><label>마침일</label><input type="date" id="date_end" onchange="autoSave();calcPeriod();renderR3Summary()"></div>
          <div id="r3-period-wrap" style="display:none;margin-top:8px">
            <div style="background:var(--accent-light);border-radius:8px;padding:10px 14px;font-size:14px;font-weight:700;color:var(--accent);text-align:center">
              총 공부 기간 : <span id="r3_period"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span class="card-title">마침 그룹원 명단</span></div>
        <div class="card-body">
          <div class="count-row">
            <div class="count-box">
              <label>시작 그룹원 수</label>
              <input type="number" id="cnt_start" min="0" placeholder="0" oninput="autoSave()">
              <span style="font-size:11px;color:var(--text3);text-align:center">명</span>
            </div>
            <div class="count-box">
              <label>마침 그룹원 수</label>
              <input type="number" id="cnt_end" min="0" placeholder="0" oninput="autoSave()">
              <span style="font-size:11px;color:var(--text3);text-align:center">명</span>
            </div>
          </div>
          <div id="report-list">
            <div class="empty-hint">① 시작 보고서에서 그룹원을 추가하세요.</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr"><span class="card-title">특기사항 · 소감</span></div>
        <div class="card-body">
          <div class="field"><label>인원변동 사유 (변동 시)</label><textarea id="note_change" rows="2" placeholder="변동이 있는 경우만 작성" oninput="autoSave()"></textarea></div>
          <div class="field"><label>그룹운영 특기사항</label><textarea id="note_special" rows="3" placeholder="특기할 사항을 기록하세요" oninput="autoSave()"></textarea></div>
          <div class="field"><label>건의사항</label><textarea id="note_suggest" rows="2" placeholder="본당이나 교구에 건의할 사항" oninput="autoSave()"></textarea></div>
          <div class="field"><label>소감</label><textarea id="note_feeling" rows="4" placeholder="그룹공부를 마치며 느낀 점" oninput="autoSave()"></textarea></div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /screen-edit -->

<script>
/* ════════ 데이터 ════════ */
let records=[], currentId=null;

function makeRecord(){
  return{id:Date.now(),topic:'',parish:'',schedule:'',date_start:'',
    vol_name:'',vol_bap:'',vol_birth:'',addr_home:'',addr_work:'',
    phone:'',email:'',vol_parish:'',vol_id:'',
    date_end:'',cnt_start:'',cnt_end:'',
    note_change:'',note_special:'',note_suggest:'',note_feeling:'',
    members:[],dateCols:[],attData:{},reportData:{}};
}
function currentRec(){ return records.find(r=>r.id===currentId)||null; }

/* ════════ 저장 ════════ */
function saveAll(){ try{localStorage.setItem('arca_records',JSON.stringify(records));}catch(e){} }
function loadAll(){ try{const r=localStorage.getItem('arca_records');if(r)records=JSON.parse(r);}catch(e){records=[];} }

/* ════════ 화면 전환 ════════ */
function goList(){
  autoSave();
  document.getElementById('screen-list').classList.add('active');
  document.getElementById('screen-edit').classList.remove('active');
  renderList();
}
function goEdit(id){
  currentId=id;
  document.getElementById('screen-list').classList.remove('active');
  document.getElementById('screen-edit').classList.add('active');
  showTab(0);
  loadForm();
  updateEditTitle();
}

/* ════════ 목록 ════════ */
function newRecord(){
  const rec=makeRecord();
  records.unshift(rec);
  saveAll();
  goEdit(rec.id);
}
function deleteRecord(id,e){
  e.stopPropagation();
  const rec=records.find(r=>r.id===id);
  if(!confirm(`「${rec?.topic||rec?.parish||'이 기록'}」을 삭제할까요?`))return;
  records=records.filter(r=>r.id!==id);
  saveAll(); renderList();
}
function renderList(){
  const area=document.getElementById('list-area');
  const cnt=document.getElementById('list-count');
  cnt.textContent=`기록 목록 (총 ${records.length}건)`;
  if(!records.length){
    area.innerHTML=`<div class="list-empty"><strong>아직 기록이 없습니다</strong>「+ 새 기록」 버튼을 눌러 시작하세요.</div>`;
    return;
  }
  area.innerHTML=records.map(rec=>{
    const topic=esc(rec.topic||'(주제 미입력)');
    const parish=esc(rec.parish||'장소 미입력');
    const start=rec.date_start?fmtDate(rec.date_start):'시작일 미입력';
    const end=rec.date_end?' ~ '+fmtDate(rec.date_end):'';
    const mc=(rec.members||[]).length;
    return `<div class="record-card" onclick="goEdit(${rec.id})">
      <div class="card-accent-bar"></div>
      <div class="card-info">
        <div class="card-topic">${topic}</div>
        <div class="card-meta">
          <span>📍 ${parish}</span>
          <span>📅 ${start}${end}</span>
          ${mc>0?`<span class="card-badge">${mc}명</span>`:''}
        </div>
      </div>
      <div class="card-btns">
        <button class="icon-btn" onclick="goEdit(${rec.id});event.stopPropagation()">편집</button>
        <button class="icon-btn del" onclick="deleteRecord(${rec.id},event)">삭제</button>
      </div>
    </div>`;
  }).join('');
}
function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

/* ════════ 폼 필드 ════════ */
const FIELDS=['topic','parish','schedule','date_start','vol_name','vol_bap','vol_birth','addr_home','addr_work','phone','email','vol_parish','vol_id','date_end','cnt_start','cnt_end','note_change','note_special','note_suggest','note_feeling'];

function loadForm(){
  const rec=currentRec(); if(!rec)return;
  FIELDS.forEach(f=>{const el=document.getElementById(f);if(el)el.value=rec[f]||'';});
  renderMembers(); renderAtt(); renderDateChips();
}
function autoSave(){
  const rec=currentRec(); if(!rec)return;
  FIELDS.forEach(f=>{const el=document.getElementById(f);if(el)rec[f]=el.value;});
  saveAll();
}
function updateEditTitle(){
  const rec=currentRec(); if(!rec)return;
  const t=[rec.topic,rec.parish].filter(Boolean).join(' · ')||'새 기록';
  document.getElementById('edit-title').textContent=t;
}

/* ════════ 탭 ════════ */
function showTab(i){
  document.querySelectorAll('.tab-btn').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.section').forEach((s,j)=>s.classList.toggle('active',i===j));
  if(i===1)renderAtt();
  if(i===2){renderR3Summary();renderReport();}
}

/* ════════ 그룹원 ════════ */
function addMember(){
  const rec=currentRec();if(!rec)return;
  rec.members.push({name:'',bap:'',phone:'',email:'',birth:'',parish:''});
  saveAll();renderMembers();
}
function removeMember(i){
  const rec=currentRec();if(!rec)return;
  if(!confirm(`${i+1}번 그룹원을 삭제할까요?`))return;
  rec.members.splice(i,1);saveAll();renderMembers();
}
function updateMember(i,field,val){
  const rec=currentRec();if(!rec)return;
  rec.members[i][field]=val;saveAll();
}
function renderMembers(){
  const rec=currentRec();
  const el=document.getElementById('member-list');
  if(!rec||!rec.members.length){
    el.innerHTML=`<div class="empty-hint">「추가」 버튼을 눌러<br>그룹원을 입력하세요.</div>`;return;
  }
  el.innerHTML=rec.members.map((m,i)=>`
    <div class="member-card">
      <div class="member-card-hdr">
        <span class="member-num">${i+1}번 그룹원</span>
        <button class="btn btn-red" style="padding:5px 10px;font-size:11px" onclick="removeMember(${i})">삭제</button>
      </div>
      <div class="member-card-body">
        <div class="member-field-row">
          <div class="member-field"><label>이름</label><input value="${esc(m.name)}" onchange="updateMember(${i},'name',this.value)" placeholder="이름"></div>
          <div class="member-field"><label>세례명</label><input value="${esc(m.bap)}" onchange="updateMember(${i},'bap',this.value)" placeholder="세례명"></div>
        </div>
        <div class="member-field"><label>핸드폰</label><input type="tel" value="${esc(m.phone)}" onchange="updateMember(${i},'phone',this.value)" placeholder="010-0000-0000"></div>
        <div class="member-field"><label>이메일</label><input type="email" value="${esc(m.email)}" onchange="updateMember(${i},'email',this.value)" placeholder="이메일"></div>
        <div class="member-field-row">
          <div class="member-field"><label>생년월일</label><input value="${esc(m.birth)}" onchange="updateMember(${i},'birth',this.value)" placeholder="생년월일"></div>
          <div class="member-field"><label>본당</label><input value="${esc(m.parish)}" onchange="updateMember(${i},'parish',this.value)" placeholder="본당"></div>
        </div>
      </div>
    </div>`).join('');
}

/* ════════ 출석부 ════════ */
function addDateCol(){
  const rec=currentRec();if(!rec)return;
  const v=document.getElementById('new-date').value.trim();
  if(!v){alert('날짜를 입력하세요. 예) 1/26');return;}
  rec.dateCols.push(v);
  document.getElementById('new-date').value='';
  saveAll();renderAtt();renderDateChips();
}
function removeLastDate(){
  const rec=currentRec();if(!rec||!rec.dateCols.length)return;
  if(!confirm(`「${rec.dateCols[rec.dateCols.length-1]}」 날짜를 삭제할까요?`))return;
  rec.dateCols.pop();saveAll();renderAtt();renderDateChips();
}
function renderDateChips(){
  const rec=currentRec();
  const el=document.getElementById('date-chips');
  if(!el)return;
  if(!rec||!rec.dateCols.length){el.innerHTML='';return;}
  el.innerHTML=rec.dateCols.map(d=>`<span style="background:var(--accent-light);color:var(--accent2);padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700">${d}</span>`).join('');
}
function updateAtt(i,j,val,sel){
  const rec=currentRec();if(!rec)return;
  rec.attData[`${i}_${j}`]=val;saveAll();
  sel.className='att-sel '+(val==='○'?'att-o':val==='×'?'att-x':val==='△'?'att-tri':'');
}
function renderAtt(){
  const rec=currentRec();
  const el=document.getElementById('att-list');
  renderDateChips();
  if(!rec||!rec.members.length||!rec.dateCols.length){
    el.innerHTML=`<div class="empty-hint">그룹원과 날짜를 먼저 추가하세요.</div>`;return;
  }
  el.innerHTML=rec.members.map((m,i)=>`
    <div class="att-member-block">
      <div class="att-member-name">${i+1}. ${esc(m.name)||'(미입력)'} ${m.bap?'<span style="font-size:11px;color:var(--text3)">'+esc(m.bap)+'</span>':''}</div>
      <div class="att-dates-grid">
        ${rec.dateCols.map((d,j)=>{
          const v=rec.attData[`${i}_${j}`]||'';
          const cls='att-sel '+(v==='○'?'att-o':v==='×'?'att-x':v==='△'?'att-tri':'');
          const opts=['','○','×','△'].map(o=>`<option value="${o}"${v===o?' selected':''}>${o||'—'}</option>`).join('');
          return`<div class="att-date-item">
            <span class="att-date-label">${d}</span>
            <select class="${cls}" onchange="updateAtt(${i},${j},this.value,this)">${opts}</select>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

/* ════════ 마침 보고서 ════════ */
function renderR3Summary(){
  const rec=currentRec();
  const el=document.getElementById('r3-summary');
  if(!el||!rec)return;
  const volStr=[rec.vol_name,rec.vol_bap].filter(Boolean).join(' ');
  el.innerHTML=`
    <strong>${rec.topic||'—'}</strong><br>
    📍 ${rec.parish||'—'} &nbsp;·&nbsp; ${rec.schedule||'—'}<br>
    봉사자: ${volStr||'—'} &nbsp;·&nbsp; 시작일: ${rec.date_start?fmtDate(rec.date_start):'—'}`;
  calcPeriod();
}
function calcPeriod(){
  const rec=currentRec();
  const periodEl=document.getElementById('r3_period');
  const wrap=document.getElementById('r3-period-wrap');
  if(!rec||!periodEl)return;
  const s=rec.date_start, e=document.getElementById('date_end')?.value||rec.date_end;
  if(!s||!e){if(wrap)wrap.style.display='none';return;}
  const ds=new Date(s),de=new Date(e);
  if(de<ds){if(wrap)wrap.style.display='none';return;}
  let y=de.getFullYear()-ds.getFullYear(),m=de.getMonth()-ds.getMonth();
  if(m<0){y--;m+=12;}
  periodEl.textContent=`${y}년 ${m}개월`;
  if(wrap)wrap.style.display='block';
}
function updateReport(i,field,val){
  const rec=currentRec();if(!rec)return;
  if(!rec.reportData[i])rec.reportData[i]={train:'',rec:'',reg:''};
  rec.reportData[i][field]=val;saveAll();
}
function renderReport(){
  const rec=currentRec();
  const el=document.getElementById('report-list');
  if(!rec||!rec.members.length){
    el.innerHTML=`<div class="empty-hint">① 시작 보고서에서 그룹원을 추가하세요.</div>`;return;
  }
  el.innerHTML=rec.members.map((m,i)=>{
    if(!rec.reportData[i])rec.reportData[i]={train:'',rec:'',reg:''};
    const rd=rec.reportData[i];
    return`<div class="report-card">
      <div class="report-card-hdr">${i+1}. ${esc(m.name)||'(미입력)'} <span style="font-size:11px;color:var(--text3)">${esc(m.bap)||''}</span></div>
      <div class="report-card-body">
        <div class="report-field"><label>지금까지 받은 연수</label><input value="${esc(rd.train)}" onchange="updateReport(${i},'train',this.value)" placeholder="예) 1차"></div>
        <div class="report-field"><label>그룹공부 기록완료</label><input value="${esc(rd.rec)}" onchange="updateReport(${i},'rec',this.value)" placeholder="완료 / 미완료"></div>
        <div class="report-field"><label>연수사항 명부 기록완료</label><input value="${esc(rd.reg)}" onchange="updateReport(${i},'reg',this.value)" placeholder="완료 / 미완료"></div>
      </div>
    </div>`;
  }).join('');
}

/* ════════ 유틸 ════════ */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toShort(iso){if(!iso)return'';const d=new Date(iso);return`${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
